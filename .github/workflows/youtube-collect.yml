name: YouTube Video Collector

on:
  schedule:
    - cron: '0 0 * * *'  # 매일 09:00 KST (UTC 00:00)
  workflow_dispatch:       # 수동 실행 (테스트용)

permissions:
  contents: read

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run collector
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE }}
          CAFE24_INSERT_URL: ${{ secrets.CAFE24_INSERT_URL }}
          CAFE24_INSERT_TOKEN: ${{ secrets.CAFE24_INSERT_TOKEN }}
          MAX_KEYWORDS: 1   # 테스트용 — 운영 시 이 줄 삭제
        run: python run.py
