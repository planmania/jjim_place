name: YouTube Video Collector

on:
  schedule:
    - cron: '0 0 * * *'  # 매일 09:00 KST (UTC 00:00)
  workflow_dispatch:       # 수동 실행 (테스트용)

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run collector
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE }}
        run: python run.py

      - name: Upload videos.json to Cafe24 via FTP
        run: |
          curl -T data/videos.json \
            "ftp://${{ secrets.CAFE24_FTP_HOST }}/www/api/youtube/videos.json" \
            --user "${{ secrets.CAFE24_FTP_USER }}:${{ secrets.CAFE24_FTP_PASS }}" \
            --ftp-create-dirs \
            --silent --show-error
